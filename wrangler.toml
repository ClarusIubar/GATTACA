# Cloudflare Pages / Workers Native 인프라 바인딩 설정

# 1. D1 Databases 바인딩 (실시간 SQL 연동)
[[d1_databases]]
binding = "DB"
database_name = "gattaca-d1"
database_id = "your-d1-uuid-here" # 대시보드 또는 CLI에서 D1 생성 시 발급된 UUID로 자동 매핑

# 2. KV Namespaces 바인딩 (글로벌 분산 세션 관리)
[[kv_namespaces]]
binding = "SESSION"
namespace_id = "your-kv-uuid-here" # 대시보드 또는 CLI에서 KV 생성 시 발급된 UUID로 자동 매핑

# 3. R2 Storage 바인딩 (추억 사진 미디어 버킷)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "memory-photos"
